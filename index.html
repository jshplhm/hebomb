<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f11">
<title>Hebomb</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:      #0d0f11;
  --surface: #13161a;
  --card:    #191d22;
  --card2:   #1e232a;
  --lift:    #252b34;
  --border:  #272d37;
  --border2: #333b47;
  --text:    #eef0f3;
  --sub:     #7d8799;
  --muted:   #4a5262;
  --yellow:  #e8ff47;
  --orange:  #ff6b35;
  --green:   #3dffa0;
  --blue:    #5ba4ff;
  --red:     #ff4455;
  --nav-h:   64px;
  --safe-bot: env(safe-area-inset-bottom, 20px);
  --safe-top: env(safe-area-inset-top, 44px);
}

html { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; font-size:16px; -webkit-text-size-adjust:100%; }
body { background:var(--bg); overscroll-behavior:none; -webkit-font-smoothing:antialiased; position:relative; }
/* Fixed safe-area scrim — blocks scrolled content from showing through the iPhone status bar */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--safe-top);
  background: var(--bg);
  z-index: 1000;
  pointer-events: none;
}
input,select,button { font-family:inherit; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
input[type=number] { -moz-appearance:textfield; }

/* ── APP SHELL ── */
#app { max-width:480px; margin:0 auto; min-height:100dvh; }
.page,.picker-page { padding:calc(var(--safe-top) + 8px) 16px calc(var(--nav-h) + var(--safe-bot) + 16px); }
.session-loading { display:flex; align-items:center; justify-content:center; height:100dvh; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }

/* ── NAV ── */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-h) + var(--safe-bot)); background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:flex-start; z-index:100; }
.nav-btn { flex:1; height:var(--nav-h); background:transparent; border:none; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; transition:color 0.1s; -webkit-tap-highlight-color:transparent; }
.nav-btn.active { color:var(--yellow); }
.nav-icon { width:22px; height:22px; display:block; }
.nav-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }

/* ── PICKER PAGE (LEGACY — kept for fallback) ── */
.picker-page { padding-top:8px; }
.picker-greeting { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.picker-hi { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--text); letter-spacing:-0.3px; line-height:1; }
.picker-subline { font-size:14px; color:var(--sub); margin-bottom:24px; }
.picker-day-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
.picker-day-card { display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px 18px; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; transition:border-color 0.12s, background 0.12s; width:100%; }
.picker-day-card:active { border-color:var(--yellow); background:var(--card2); }
.picker-day-card-left { display:flex; flex-direction:column; gap:5px; }
.picker-day-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; text-transform:uppercase; color:var(--text); letter-spacing:-0.3px; line-height:1; }
.picker-day-last { font-size:12px; color:var(--muted); }
.picker-day-arrow { font-size:20px; color:var(--border2); flex-shrink:0; }
.btn-start { width:100%; background:var(--yellow); color:#0a0a0a; border:none; border-radius:6px; font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:16px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity 0.1s; }
.btn-start:active { opacity:0.75; }

.picker-past { display:flex; align-items:center; gap:10px; }
.picker-past-label { font-size:13px; color:var(--muted); white-space:nowrap; }
.picker-date-input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--sub); font-size:14px; padding:9px 12px; }
.picker-date-input:focus { outline:none; border-color:var(--yellow); }

/* ── LANDING V2 ── */
.picker-v2 { padding-top: 8px; }

/* Identity strip */
.land-id { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; padding:8px 0 14px; }
.land-id-left { line-height:1; }
.land-greet { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
.land-name { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900; color:var(--text); letter-spacing:-0.5px; line-height:0.95; }
.land-phase-chip { display:flex; flex-direction:column; align-items:flex-end; gap:4px; font-family:'Barlow Condensed',sans-serif; }
.land-phase-chip .wk { font-size:10px; font-weight:700; letter-spacing:2.5px; color:var(--muted); text-transform:uppercase; }
.land-phase-chip .ph { font-size:12px; font-weight:900; letter-spacing:1.5px; padding:3px 10px; background:rgba(232,255,71,.08); color:var(--yellow); border:1px solid rgba(232,255,71,.3); border-radius:4px; text-transform:uppercase; }
.land-phase-chip .ph.phase-hypertrophy { background:rgba(255,107,53,.08); color:var(--orange); border-color:rgba(255,107,53,.3); }
.land-phase-chip .ph.phase-deload { background:rgba(91,164,255,.08); color:var(--blue); border-color:rgba(91,164,255,.3); }
.land-phase-chip .ph.phase-peak { background:rgba(184,127,255,.08); color:#b87fff; border-color:rgba(184,127,255,.3); }
.land-phase-chip .ph.phase-conditioning { background:rgba(61,255,160,.08); color:var(--green); border-color:rgba(61,255,160,.3); }

/* Week rhythm */
.land-week { display:flex; gap:6px; padding:14px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:18px; }
.land-week-cell { flex:1; text-align:center; padding:2px 0; font-family:'Barlow Condensed',sans-serif; }
.land-week-cell .dow { font-size:10px; font-weight:700; letter-spacing:1.5px; color:var(--muted); }
.land-week-cell .dot { width:20px; height:20px; border-radius:50%; margin:4px auto 0; display:flex; align-items:center; justify-content:center; font-family:'Barlow',sans-serif; font-size:11px; font-weight:700; }
.land-week-cell.done .dot { background:var(--yellow); color:#0a0a0a; }
.land-week-cell.today .dot { background:transparent; border:2px solid var(--yellow); color:var(--yellow); font-size:9px; }
.land-week-cell.rest .dot { background:transparent; border:1px solid #2a2a2a; color:var(--muted); font-size:11px; }
.land-week-cell .lbl { font-size:8px; color:var(--muted); margin-top:5px; letter-spacing:1px; text-transform:uppercase; }
.land-week-cell.done .lbl { color:var(--green); }
.land-week-cell.today .lbl { color:var(--yellow); }

/* Hero card */
.land-today-hero {
  position:relative; display:block; width:100%; text-align:left;
  background:linear-gradient(135deg, rgba(232,255,71,.10) 0%, rgba(232,255,71,.02) 100%);
  border:1px solid rgba(232,255,71,.35);
  border-radius:14px;
  padding:20px 18px;
  margin-bottom:14px;
  overflow:hidden;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:transform 0.08s, border-color 0.12s;
}
.land-today-hero:active { transform:scale(0.99); border-color:rgba(232,255,71,.55); }
.land-today-hero.land-hero-loading .land-today-meta { opacity:0.35; }
.land-today-hero.land-hero-loading { animation:heroLoadPulse 1.4s ease-in-out infinite; }
@keyframes heroLoadPulse { 0%,100%{opacity:0.85} 50%{opacity:0.65} }
.land-today-hero::before {
  content:""; position:absolute; top:-30px; right:-30px; width:160px; height:160px;
  background:radial-gradient(circle, rgba(232,255,71,.18), transparent 60%);
  pointer-events:none;
}
.land-today-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--yellow); margin-bottom:6px; display:flex; align-items:center; gap:8px; position:relative; z-index:1; }
.land-today-eyebrow .pulse { width:8px; height:8px; border-radius:50%; background:var(--yellow); box-shadow:0 0 8px rgba(232,255,71,.6); animation:landpulse 1.4s ease-in-out infinite; }
@keyframes landpulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
.land-today-title { font-family:'Barlow Condensed',sans-serif; font-size:34px; font-weight:900; line-height:1; color:var(--text); letter-spacing:-0.5px; margin-bottom:14px; text-transform:uppercase; position:relative; z-index:1; }
.land-today-meta { display:flex; flex-wrap:wrap; gap:14px; padding-top:14px; border-top:1px dashed rgba(232,255,71,.2); font-family:'Barlow Condensed',sans-serif; position:relative; z-index:1; }
.land-meta-pair { display:flex; flex-direction:column; gap:2px; }
.land-meta-pair .lbl { font-size:9px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.land-meta-pair .val { font-size:14px; font-weight:700; color:var(--text); }
.land-meta-pair .val.green { color:var(--green); }
.land-today-cta { margin-top:16px; width:100%; padding:14px; background:var(--yellow); color:#0a0a0a; border:none; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap:10px; position:relative; z-index:1; }

/* Streak */
.land-streak { margin-bottom:18px; display:flex; align-items:center; gap:10px; padding:10px 14px; background:rgba(255,107,53,.06); border:1px solid rgba(255,107,53,.25); border-radius:8px; }
.land-streak-icon { font-size:18px; line-height:1; }
.land-streak-text { font-family:'Barlow Condensed',sans-serif; font-size:13px; color:var(--sub); letter-spacing:0.5px; }
.land-streak-text strong { color:var(--orange); font-weight:900; }

/* Other days */
.land-others-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin:6px 0 4px; }
.land-others { display:flex; flex-direction:column; }
.land-other-row { width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); cursor:pointer; background:transparent; border-left:none; border-right:none; border-top:none; text-align:left; -webkit-tap-highlight-color:transparent; transition:opacity 0.1s; }
.land-other-row:last-child { border-bottom:none; }
.land-other-row:active { opacity:0.7; }
.land-other-left { display:flex; flex-direction:column; gap:3px; align-items:flex-start; min-width:0; }
.land-other-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; text-transform:uppercase; color:var(--sub); letter-spacing:0.5px; }
.land-other-last { font-size:11px; color:var(--muted); font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; text-transform:uppercase; }
.land-other-arrow { color:var(--muted); font-size:18px; }

/* ── SESSION SHELL ── */
#session-wrap { display:flex; flex-direction:column; height:100dvh; background:var(--bg); position:relative; overflow:hidden; }

/* session header moved to new focused-logging-screen block below */

/* ════════════════════════════════════════════════
   FOCUSED LOGGING SCREEN — redesign
   ════════════════════════════════════════════════ */

/* ── SESSION HEADER (pinned) ── */
.sess-header { flex-shrink:0; background:var(--bg); padding:calc(var(--safe-top) + 4px) 12px 0; }
.sess-hdr-row { display:grid; grid-template-columns:36px 1fr 36px; align-items:center; gap:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
.sess-icon-btn { width:36px; height:36px; background:transparent; border:none; color:var(--muted); padding:0; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:color 0.1s; }
.sess-icon-btn:active { color:var(--text); }
.sess-hdr-center { display:flex; flex-direction:column; align-items:center; gap:3px; min-width:0; }
.sess-ex-name { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:900; text-transform:uppercase; color:var(--text); line-height:1; background:transparent; border:none; padding:0; cursor:pointer; text-align:center; min-width:0; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; -webkit-tap-highlight-color:transparent; letter-spacing:0.3px; }

/* Single-row dot + counter strip directly under the name */
.sess-dots-row { display:flex; align-items:center; justify-content:center; gap:6px; min-height:14px; flex-wrap:nowrap; max-width:100%; overflow:hidden; }
.sdot { display:inline-block; border-radius:50%; flex-shrink:0; transition:all 0.2s; }
.sdot-done { width:7px; height:7px; background:var(--yellow); }
.sdot-next { width:9px; height:9px; background:transparent; border:2px solid var(--yellow); }
.sdot-up   { width:6px; height:6px; background:transparent; border:1.5px solid var(--border2); }
.sdot-warm { width:4px; height:4px; background:var(--muted); }
.sess-set-label { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--sub); margin-left:6px; flex-shrink:0; }
.sess-target-inline { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; color:var(--green); background:rgba(61,255,160,.08); border:1px solid rgba(61,255,160,.2); border-radius:9px; padding:1px 7px; margin-left:4px; white-space:nowrap; flex-shrink:0; }
.sess-set-type-badge { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-left:4px; flex-shrink:0; }

/* ── LOGGING STATE — set context list ── */
.sess-focus { flex:1; display:flex; flex-direction:column; overflow-y:auto; -webkit-overflow-scrolling:touch; min-height:0; }
.sf-set-list { display:flex; flex-direction:column; padding:10px 14px 6px; gap:5px; flex:1; min-height:0; }

/* Done/upcoming compact rows */
.sf-row { display:flex; align-items:center; gap:10px; padding:6px 12px; border-radius:8px; flex-shrink:0; }
.sf-row-done { background:var(--card); opacity:0.5; }
.sf-row-up { background:transparent; border:1px dashed var(--border); }

.sf-row-num { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; color:var(--muted); width:14px; text-align:center; flex-shrink:0; letter-spacing:1px; }
.sf-row-num-cur { color:var(--yellow); font-size:12px; }
.sf-row-data { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; color:var(--sub); flex:1; letter-spacing:-0.3px; }
.sf-row-data-up { color:var(--muted); font-size:14px; }
.sf-row-x { color:var(--muted); font-weight:300; margin:0 3px; font-size:12px; }
.sf-row-unit { font-size:9px; color:var(--muted); font-weight:700; letter-spacing:1px; margin-left:3px; text-transform:uppercase; }
.sf-row-check { color:var(--green); font-size:13px; flex-shrink:0; }

/* Current set — grows to fill remaining space */
.sf-row-current { background:transparent; padding:0; align-items:stretch; gap:0; flex-direction:column; flex:1 1 auto; min-height:0; }
.sf-current-block { flex:1 1 auto; display:flex; flex-direction:column; min-height:0; }
.sf-current-block .sf-big-row { flex:1 1 auto; }

/* Set identity — hidden; info now lives in the header dots row */
.sf-set-id { display:none; }
.sf-target-row { display:none; }

/* Big reps × weight — stacked vertically, each half fills 50% of the focus zone */
.sf-big-row { display:flex; flex-direction:column; align-items:stretch; gap:8px; padding:8px 14px; flex:1 1 auto; min-height:0; }
.sf-x { display:none; }
.sf-field {
  flex: 1 1 50%;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px;
}
.sf-field-label {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted);
  flex-shrink: 0;
}
.sf-field-row {
  flex: 1 1 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  min-height: 0;
}
.sf-big-num {
  font-family:'Barlow Condensed',sans-serif;
  font-size: min(34vw, 22vh);
  font-weight: 900; color: var(--text);
  line-height: 1;
  letter-spacing: -3px;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  flex: 1 1 auto;
  min-width: 0;
}
.sf-steppers {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  align-items: center;
}
.sf-step-btn {
  width: 56px;
  height: clamp(56px, 10vh, 80px);
  background: var(--card2);
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  color: var(--sub);
  font-size: 30px;
  font-weight: 300;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.08s, color 0.08s, transform 0.08s;
  user-select: none;
  padding: 0;
}
.sf-step-btn:active { background:var(--lift); color:var(--yellow); transform:scale(0.95); }

/* All-sets-done — list condensed sets above, centered check in remaining space */
.sf-all-done { display:none; } /* legacy */
.sf-done-wrap { display:flex; flex-direction:column; flex:1; min-height:0; gap:10px; padding:8px 0; }
.sf-done-list { display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
.sf-done-row {
  display:flex; align-items:center; gap:10px;
  padding:7px 14px; border-radius:8px;
  background:var(--card); opacity:0.85;
  font-family:'Barlow Condensed',sans-serif;
}
.sf-done-row-warm { opacity:0.45; background:transparent; border:1px dashed var(--border); }
.sf-done-row-pr { background:linear-gradient(180deg, rgba(232,255,71,.12), rgba(232,255,71,.04)); border:1px solid rgba(232,255,71,.4); opacity:1; }
.sf-done-num { font-size:11px; font-weight:700; color:var(--muted); width:14px; text-align:center; letter-spacing:1px; flex-shrink:0; }
.sf-done-w { font-size:11px; font-weight:700; color:var(--green); width:14px; text-align:center; letter-spacing:1px; flex-shrink:0; }
.sf-done-data { font-size:17px; font-weight:700; color:var(--text); flex:1; letter-spacing:-0.3px; }
.sf-done-x { color:var(--muted); font-weight:300; margin:0 4px; font-size:14px; }
.sf-done-unit { font-size:9px; color:var(--muted); font-weight:700; letter-spacing:1px; margin-left:4px; text-transform:uppercase; }
.sf-done-tick { color:var(--green); font-size:14px; flex-shrink:0; opacity:0.7; }
.sf-done-pr { color:#0a0a0a; background:var(--yellow); font-size:9px; font-weight:900; padding:3px 8px; border-radius:4px; letter-spacing:1.5px; flex-shrink:0; }

.sf-done-stats {
  display:flex; align-items:baseline; gap:8px;
  padding:8px 14px;
  border-top:1px dashed var(--border);
  flex-shrink:0;
}
.sf-done-stat-val { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--yellow); letter-spacing:-1px; line-height:1; }
.sf-done-stat-lbl { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }

.sf-done-hero { flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; padding:12px 0; }
.sf-done-check { font-size:60px; color:var(--green); line-height:1; }
.sf-done-check-pr { color:var(--yellow); animation:donePulse 1.6s ease-in-out infinite; }
@keyframes donePulse { 0%,100% { transform:scale(1);} 50% { transform:scale(1.06);} }
.sf-done-label { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
.sf-done-check-pr + .sf-done-label { color:var(--yellow); }

/* Current set — prominent SET N OF M label above the tiles */
.sf-current-set-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--yellow);
  text-align: center;
  padding: 6px 14px 4px;
  flex-shrink: 0;
}

/* Edit icon on done rows */
.sf-row-edit {
  color: var(--muted);
  font-size: 13px;
  flex-shrink: 0;
  opacity: 0.35;
  transition: opacity 0.15s;
}
.sf-row-done:active .sf-row-edit { opacity: 1; }
.sf-row-done { cursor: pointer; -webkit-tap-highlight-color: transparent; }
.sf-row-done:active { background: var(--card2); opacity: 1; }

/* Skip + Log action row */
.sf-action-row { flex-shrink:0; display:flex; gap:8px; padding:12px 14px calc(var(--safe-bot) + 14px); background:var(--bg); border-top:1px solid var(--border); align-items:stretch; }
.sf-skip-btn { background:transparent; border:1.5px solid var(--border2); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:0 18px; border-radius:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0; transition:all 0.12s; }
.sf-skip-btn:active { border-color:var(--sub); color:var(--sub); }
.sf-log-btn { flex:1; height:64px; background:var(--yellow); border:none; border-radius:10px; color:#0a0a0a; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:2px; text-transform:uppercase; cursor:pointer; -webkit-tap-highlight-color:transparent; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.1s, transform 0.08s; }
.sf-log-btn:active { opacity:0.85; transform:scale(0.98); }
.sf-log-btn.ready { background:var(--green); }
.sf-log-btn svg { flex-shrink:0; }

.sf-action-row.flash-saved { animation:savedFlash 0.7s ease-out; }
@keyframes savedFlash {
  0%   { box-shadow: 0 -2px 0 0 transparent; }
  20%  { box-shadow: 0 -2px 0 0 var(--green); }
  100% { box-shadow: 0 -2px 0 0 transparent; }
}

/* ── REST UI — pill in action row + always-reserved progress bar ── */
#rest-progress-bar {
  height: 3px;                      /* always 3px — no layout shift on activation */
  background: rgba(255,255,255,.05);
  flex-shrink: 0;
  overflow: hidden;
}
#rest-progress-fill {
  height: 100%;
  background: transparent;          /* transparent until active */
  width: 0%;
  transition: width 0.5s linear, background 0.3s;
}
#rest-progress-bar.active #rest-progress-fill { background: var(--green); }
#rest-progress-bar.overtime #rest-progress-fill { background: var(--orange); }

/* Rest pill — no SKIP, time is big, −30/+30 stacked on right */
.sf-rest-pill {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
  background: linear-gradient(135deg, rgba(61,255,160,.12), rgba(61,255,160,.04));
  border: 1.5px solid rgba(61,255,160,.4);
  border-radius: 10px;
  padding: 8px 12px;
}
.sf-rest-pill.overtime {
  background: linear-gradient(135deg, rgba(255,107,53,.14), rgba(255,107,53,.05));
  border-color: rgba(255,107,53,.5);
  animation: restPulse 1.2s ease-in-out infinite;
}
@keyframes restPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,107,53,0); }
  50%     { box-shadow: 0 0 0 4px rgba(255,107,53,.18); }
}
.sf-rest-time-block { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.sf-rest-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--green); line-height: 1; margin-bottom: 2px;
}
.sf-rest-pill.overtime .sf-rest-label { color: var(--orange); }
.sf-rest-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px; font-weight: 900; color: var(--text);
  line-height: 0.9; letter-spacing: -2px;
}
.sf-rest-pill.overtime .sf-rest-time { color: var(--orange); }
.sf-rest-adj {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex-shrink: 0;
}
.sf-rest-adj button {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--sub);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  transition: all 0.1s;
}
.sf-rest-adj button:active { border-color: var(--sub); color: var(--text); }

/* ── PROGRAM DRAWER ── */
#prog-drawer { position:absolute; inset:0; background:var(--bg); z-index:80; transform:translateY(-100%); transition:transform 0.3s cubic-bezier(0.32,0.72,0,1); overflow:hidden; display:flex; flex-direction:column; }
#prog-drawer.open { transform:translateY(0); }
.drawer-header { display:flex; align-items:center; justify-content:space-between; padding:calc(var(--safe-top) + 8px) 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface); }
.drawer-title { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--sub); }
.drawer-day-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; color:var(--text); line-height:1; }
.drawer-end-btn { background:transparent; border:1px solid var(--border2); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:8px 14px; border-radius:6px; cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0; transition:all 0.1s; }
.drawer-end-btn:active { border-color:var(--red); color:var(--red); }
.drawer-close-btn { background:transparent; border:none; color:var(--muted); font-size:22px; padding:4px 8px; cursor:pointer; -webkit-tap-highlight-color:transparent; flex-shrink:0; line-height:1; }
.drawer-ex-list { overflow-y:auto; flex:1; padding-bottom:calc(var(--safe-bot) + 16px); -webkit-overflow-scrolling:touch; }
.drawer-ex-row { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background 0.1s; gap:12px; }
.drawer-ex-row:last-child { border-bottom:none; }
.drawer-ex-row:active { background:var(--card); }
.drawer-ex-row.current { background:rgba(232,255,71,.04); }
.drawer-ex-num { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; color:var(--muted); flex-shrink:0; min-width:18px; }
.drawer-ex-num.current { color:var(--yellow); }
.drawer-ex-info { flex:1; min-width:0; }
.drawer-ex-name { font-size:15px; font-weight:500; color:var(--sub); }
.drawer-ex-name.current { color:var(--text); font-weight:600; }
.drawer-ex-here { display:block; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--yellow); margin-top:2px; }
.drawer-ex-progress { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; color:var(--muted); flex-shrink:0; }
.drawer-ex-progress.done { color:var(--green); }
.drawer-ex-row.finisher { background:rgba(91,164,255,.04); }
.drawer-ex-row.finisher .drawer-ex-name { color:var(--blue,#5ba4ff); }
.drawer-edit-bar { display:flex; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--surface); align-items:center; }
.drawer-row-controls { display:flex; gap:4px; flex-shrink:0; }

/* Drawer v2 */
.drawer-toolbar { display:flex; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); background:var(--surface); align-items:center; }
.drawer-toolbar .prev-tool-segment { background:var(--card); }
.drawer-row { margin: 6px 12px 0; }
.drawer-row.current { border-color:rgba(232,255,71,.3); background:rgba(232,255,71,.04); }
.ex-row-here { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--yellow); margin-left:8px; vertical-align:middle; }
.drawer-row .meta-done { color:var(--green); font-weight:700; }
.drawer-swipe-wrap { margin: 6px 12px 0; }

/* ── EXERCISE QUEUE (compact scroll strip) ── */
.sess-queue { display:flex; gap:6px; overflow-x:auto; padding:8px 14px; border-top:1px solid var(--border); flex-shrink:0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.sess-queue::-webkit-scrollbar { display:none; }
.sq-pill { flex-shrink:0; padding:5px 12px; border-radius:20px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; white-space:nowrap; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.sq-pill:active { border-color:var(--yellow); color:var(--yellow); }
.sq-active { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a !important; }
.sq-done { opacity:0.35; text-decoration:line-through; }
.sq-partial { border-color:var(--yellow); color:var(--yellow); }

/* Keep old bottom bar classes for non-session screens (stats/history don't use these) */
.sess-bottom { flex-shrink:0; background:var(--surface); border-top:1px solid var(--border); padding:10px 14px calc(var(--safe-bot) + 10px); display:flex; gap:8px; }
.sess-add-ex-btn { flex:0 0 auto; background:transparent; border:1.5px dashed var(--border2); color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:11px 14px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; -webkit-tap-highlight-color:transparent; transition:all 0.15s; white-space:nowrap; }
.sess-add-ex-btn:active { border-color:var(--yellow); color:var(--yellow); }
.sess-done-btn { flex:1; background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:14px; border-radius:6px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.sess-done-btn:active { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a; transform:scale(0.97); }
.sess-done-btn.ready { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a; }

/* ── SHEETS (exercise picker, confirm, ex menu) ── */
.sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:400; display:flex; align-items:flex-end; }

/* Confirm sheet */
.confirm-sheet { background:var(--card); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; padding:20px 16px calc(var(--safe-bot) + 20px); display:flex; flex-direction:column; gap:8px; }
.confirm-sheet-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--sub); margin-bottom:4px; }
.confirm-action { background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:16px; font-weight:500; padding:14px 16px; border-radius:8px; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.confirm-action:active { background:var(--lift); }
.confirm-action.danger { color:var(--orange); }
.confirm-action.muted { color:var(--sub); }

/* Exercise menu sheet */
.ex-menu-sheet { background:var(--card); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; padding:20px 16px calc(var(--safe-bot) + 20px); }
.ex-menu-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; color:var(--text); margin-bottom:16px; letter-spacing:0.3px; }
.ex-menu-btn { display:block; width:100%; background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; font-weight:500; padding:13px 16px; border-radius:8px; cursor:pointer; text-align:left; margin-bottom:8px; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.ex-menu-btn:active { background:var(--lift); }
.ex-menu-btn.danger { color:var(--orange); border-color:rgba(255,107,53,.3); }
.ex-menu-cancel { display:block; width:100%; background:transparent; border:1px solid var(--border2); color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:12px 16px; border-radius:8px; cursor:pointer; text-align:center; margin-top:4px; -webkit-tap-highlight-color:transparent; }

/* Exercise picker sheet */
.sheet { background:var(--surface); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; max-height:80dvh; display:flex; flex-direction:column; overflow:hidden; }
.sheet-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sheet-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.sheet-close { background:transparent; border:none; color:var(--sub); font-size:20px; cursor:pointer; padding:2px 6px; -webkit-tap-highlight-color:transparent; }
.sheet-search { padding:10px 14px; flex-shrink:0; }
.sheet-search input { width:100%; background:var(--card2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:15px; padding:10px 12px; }
.sheet-search input:focus { outline:none; border-color:var(--yellow); }
.sheet-search input::placeholder { color:var(--muted); }
.sheet-list { overflow-y:auto; flex:1; padding:6px 0 calc(var(--safe-bot)+16px); -webkit-overflow-scrolling:touch; }
.sheet-group-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); padding:10px 16px 4px; }
.sheet-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.sheet-item:last-child { border-bottom:none; }
.sheet-item:active { background:var(--card2); }
.sheet-item-name { font-size:15px; font-weight:500; color:var(--text); }
.sheet-item-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.sheet-item-add { color:var(--yellow); font-size:22px; flex-shrink:0; }

/* ── PHASE BADGES ── */
.phase-badge-strength     { background:var(--yellow); color:#0a0a0a; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-hypertrophy  { background:var(--orange); color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-conditioning  { background:rgba(61,255,160,.1); color:var(--green); border:1px solid rgba(61,255,160,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-deload        { background:rgba(91,164,255,.1); color:var(--blue); border:1px solid rgba(91,164,255,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-peak          { background:rgba(184,127,255,.1); color:#b87fff; border:1px solid rgba(184,127,255,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }

/* ── STATS & HISTORY ── */
.page-header-compact { padding:0 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.compact-date-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.compact-date { font-size:13px; color:var(--sub); }
.page-title-compact { font-family:'Barlow',sans-serif; font-size:34px; font-weight:700; color:var(--text); letter-spacing:-0.5px; line-height:1; }
.stats-tabs-wrap { position:sticky; top:0; z-index:50; background:var(--bg); padding-top:calc(var(--safe-top) + 8px); padding-bottom:12px; margin:0 -16px 8px; padding-left:16px; padding-right:16px; border-bottom:1px solid var(--border); }
.stats-tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:5px; }
.stats-tab { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:9px 4px; border:none; background:transparent; color:var(--sub); cursor:pointer; border-radius:3px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.stats-tab.active { background:var(--yellow); color:#0a0a0a; }
.loading-text { text-align:center; padding:30px 0; color:var(--sub); font-size:14px; }
.loading-text.muted { color:var(--muted); }
.init-loading { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:9999; }
.init-loading-inner { display:flex; flex-direction:column; align-items:center; gap:12px; padding:0 32px; text-align:center; }
.init-loading-headline { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--text); letter-spacing:-0.5px; line-height:1.1; text-transform:uppercase; }
.init-loading-sub { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:500; color:var(--muted); letter-spacing:0.5px; }
.init-loading-spinner { display:flex; gap:6px; margin-top:4px; }
.init-loading-spinner span { width:6px; height:6px; border-radius:50%; background:var(--yellow); animation:spinDot 1.2s ease-in-out infinite; }
.init-loading-spinner span:nth-child(2) { animation-delay:0.2s; }
.init-loading-spinner span:nth-child(3) { animation-delay:0.4s; }
@keyframes spinDot { 0%,80%,100%{opacity:0.2; transform:scale(0.8)} 40%{opacity:1; transform:scale(1)} }
.workout-start-loading { }
.workout-countdown { font-family:'Barlow Condensed',sans-serif; font-size:120px; font-weight:900; color:var(--yellow); line-height:1; letter-spacing:-4px; animation:countPop 0.3s ease-out; }
@keyframes countPop { from{transform:scale(1.4); opacity:0.5} to{transform:scale(1); opacity:1} }
.section-head-plain { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin:16px 0 10px; }
.chart-block { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:14px; margin-bottom:10px; }
.chart-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--sub); }
.chart-title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.chart-trend { font-size:12px; font-weight:700; letter-spacing:0.5px; }
.chart-trend.down { color:var(--green); }
.chart-trend.up { color:var(--orange); }
.chart-trend.flat { color:var(--muted); }
.svg-chart-wrap { display:flex; gap:8px; align-items:stretch; }
.svg-chart { flex:1; height:90px; display:block; overflow:visible; }
.svg-y-labels { display:flex; flex-direction:column; justify-content:space-between; font-size:10px; color:var(--muted); text-align:right; min-width:28px; padding:2px 0; }
.chart-goal-label { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--sub); margin-top:8px; flex-wrap:wrap; }
.goal-band-dot { width:10px; height:10px; background:rgba(61,255,160,.14); border:1px solid rgba(61,255,160,.55); border-radius:2px; flex-shrink:0; }
.goal-status { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:2px 7px; border-radius:9px; margin-left:auto; }
.goal-status-in { background:rgba(61,255,160,.14); color:var(--green); border:1px solid rgba(61,255,160,.4); }
.goal-status-above { background:rgba(255,107,53,.14); color:var(--orange); border:1px solid rgba(255,107,53,.4); }
.goal-status-below { background:rgba(91,164,255,.14); color:var(--blue); border:1px solid rgba(91,164,255,.4); }
.orm-badge { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; }
.lift-meta-row { display:flex; gap:16px; margin-top:10px; padding-top:8px; border-top:1px solid var(--border); flex-wrap:wrap; }
.lift-meta-item { display:flex; flex-direction:column; gap:2px; }
.lift-meta-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.lift-meta-val { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; }
.recomp-explainer { font-size:13px; color:var(--sub); line-height:1.6; margin-bottom:14px; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:6px; }
.stretch-list { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:4px; }
.stretch-row { display:flex; align-items:center; gap:8px; padding:11px 14px; border-bottom:1px solid var(--border); font-size:14px; flex-wrap:wrap; }
.stretch-row:last-child { border-bottom:none; }
.stretch-name { flex:1; min-width:80px; font-weight:500; }
.stretch-curr { color:var(--sub); font-size:13px; }
.stretch-arrow { color:var(--muted); }
.stretch-target { color:var(--yellow); font-weight:600; }
.claude-export-card { background:rgba(91,164,255,.05); border:1px solid rgba(91,164,255,.2); border-radius:6px; padding:16px; margin-bottom:20px; }
.claude-export-text { font-size:13px; color:var(--sub); line-height:1.6; margin-bottom:14px; }
.btn-claude { background:transparent; border:1.5px solid var(--blue); color:var(--blue); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:11px 20px; border-radius:4px; cursor:pointer; width:100%; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }

.bw-quick-entry { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px 14px; margin-bottom:12px; }

.bw-quick-save:active { opacity:0.75; }
.bw-range-toggle { display:flex; gap:6px; margin-bottom:10px; }
.bw-range-btn { flex:1; background:var(--card); border:1px solid var(--border); border-radius:4px; color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:8px 4px; cursor:pointer; transition:all 0.12s; -webkit-tap-highlight-color:transparent; }

.bw-history { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }

/* Hint banner */
.ex-edit-hint { margin:6px 12px 0; padding:10px 12px; background:rgba(91,164,255,.05); border:1px solid rgba(91,164,255,.2); border-radius:6px; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.ex-edit-hint-icon { font-size:16px; flex-shrink:0; }

.ex-edit-hint-x { background:transparent; border:none; color:var(--muted); padding:4px 8px; cursor:pointer; font-size:14px; line-height:1; flex-shrink:0; }

/* Row list */
.prev-list { flex:1; overflow-y:auto; padding:12px 12px 8px; display:flex; flex-direction:column; gap:6px; -webkit-overflow-scrolling:touch; }

/* Wrapper enables swipe-to-reveal */
.ex-swipe-wrap { position:relative; overflow:hidden; border-radius:10px; transition:transform 0.18s ease; }
.ex-swipe-wrap.dragging { z-index:10; box-shadow:0 8px 24px rgba(0,0,0,.5); opacity:0.95; }

/* Row body */
.ex-row-v2 { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; position:relative; transition:transform 0.2s ease; }
.ex-row-v2.editing { grid-template-columns:24px 1fr auto auto; padding:10px 8px 10px 10px; gap:8px; }
.ex-row-trash {
  width:28px; height:28px;
  background:transparent;
  border:none;
  color:var(--muted);
  border-radius:6px;

  flex-shrink:0;
  padding:0;
  opacity:0.5;
}

.ex-row-main { min-width:0; }

.ex-row-meta { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.ex-row-meta .dot-sep { color:#333; }
.ex-row-finisher { background:linear-gradient(90deg, rgba(91,164,255,.05), transparent 60%); border-color:rgba(91,164,255,.25); }
.ex-row-finisher .ex-row-name { color:#d4e7ff; }
.ex-row-finisher .ex-row-name::before { content:"🚶  "; }
.ex-row-finisher .ex-row-meta { color:var(--blue); }
.ex-row-finbadge { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; color:var(--blue); padding:4px 8px; background:rgba(91,164,255,.08); border:1px solid rgba(91,164,255,.25); border-radius:4px; flex-shrink:0; }

/* Set chip (Edit mode) */

/* Bottom bar */

.prev-start-btn { width:100%; padding:16px; background:var(--yellow); color:#0a0a0a; border:none; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; -webkit-tap-highlight-color:transparent; transition:transform 0.08s; }
.prev-start-btn:active { transform:scale(0.98); }

/* ── PREVIEW PAGE (LEGACY) ── */
.preview-back { background:transparent; border:none; color:var(--sub); font-size:14px; cursor:pointer; padding:4px 0; margin-bottom:16px; display:inline-flex; align-items:center; gap:6px; -webkit-tap-highlight-color:transparent; }
.preview-back:active { color:var(--text); }
.preview-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:20px; }
.preview-title { font-family:'Barlow Condensed',sans-serif; font-size:34px; font-weight:900; text-transform:uppercase; letter-spacing:-0.5px; color:var(--text); line-height:1.05; }

.preview-exercises { background:var(--card); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:0; }

.preview-ctrl { width:32px; height:32px; background:var(--card2); border:1px solid var(--border2); color:var(--sub); border-radius:6px; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; padding:0; }
.preview-ctrl:active { background:var(--lift); color:var(--text); }

.preview-ex-row-edit { display:block; padding:10px 14px; }
.preview-ex-row-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }

.preview-set-lbl { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.preview-set-ctrl { display:flex; align-items:center; gap:8px; }
.preview-set-count { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; color:var(--text); min-width:30px; text-align:center; }

.drawer-ex-row-edit { display:block; padding:10px 14px; }
.drawer-ex-row-top { display:flex; align-items:center; gap:12px; }

.preview-edit-bar { display:flex; gap:8px; margin-bottom:8px; align-items:center; }
.preview-edit-toggle { background:transparent; border:1px solid var(--border2); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:6px 12px; border-radius:6px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.preview-edit-toggle.active { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a; }

.preview-edit-add { background:transparent; border:1px dashed var(--border2); color:var(--yellow); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:6px 12px; border-radius:6px; cursor:pointer; -webkit-tap-highlight-color:transparent; flex:1; }

/* ── PHASE BADGES ── */

.phase-badge-hypertrophy  { background:var(--orange); color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-conditioning  { background:rgba(61,255,160,.1); color:var(--green); border:1px solid rgba(61,255,160,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-deload        { background:rgba(91,164,255,.1); color:var(--blue); border:1px solid rgba(91,164,255,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
