<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f11">
<title>Hebomb</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --bg:      #0f0f11;
  --surface: #17181c;
  --card:    #1e2026;
  --lift:    #272a32;
  --border:  #2a2d36;
  --border2: #363a45;
  --text:    #f2f2f2;
  --sub:     #8a92a0;
  --muted:   #565d6b;
  --yellow:  #e8ff47;
  --orange:  #ff6b35;
  --green:   #3dffa0;
  --red:     #ff4444;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 16px);
}

/* ── BASE ── */
html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  height: 100%;
}
#app { height: 100%; }
button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
input  { font-family: inherit; }

/* ════════════════════════════════════════════════════════════
   PICK SCREEN
════════════════════════════════════════════════════════════ */
.pick-wrap {
  min-height: 100dvh;
  padding: calc(var(--safe-top) + 16px) 20px calc(var(--safe-bot) + 24px);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.pick-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.pick-date {
  font-size: 14px;
  color: var(--sub);
}
.pick-phase {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--sub);
}

/* Phase dot */
.phase-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.phase-dot-strength     { background: var(--yellow); }
.phase-dot-hypertrophy  { background: var(--orange); }
.phase-dot-conditioning { background: var(--green); }
.phase-dot-deload       { background: #5ba4ff; }
.phase-dot-peak         { background: #b87fff; }

/* Pick cards */
.pick-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.pick-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  text-align: left;
  transition: transform 0.1s, border-color 0.1s;
  width: 100%;
}
.pick-card:active { transform: scale(0.985); border-color: var(--border2); }

.pick-card-suggested {
  background: var(--surface);
  border-color: var(--yellow);
  border-width: 1.5px;
}

.pick-card-inner { display: flex; flex-direction: column; gap: 4px; }

.pick-card-tag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
}
.pick-card-suggested .pick-card-tag { color: var(--yellow); }

.pick-card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  text-transform: uppercase;
  color: var(--text);
  letter-spacing: 0.5px;
  line-height: 1;
}

.pick-card-cta {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--yellow);
  margin-top: 8px;
}

/* Past date row */
.pick-past {
  display: flex;
  align-items: center;
  gap: 12px;
}
.pick-past-label {
  font-size: 13px;
  color: var(--muted);
  white-space: nowrap;
}
.pick-date-input {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--sub);
  font-size: 13px;
  padding: 8px 10px;
  flex: 1;
}
.pick-date-input:focus { outline: none; border-color: var(--yellow); }

/* Loading */
.session-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  font-size: 15px;
  color: var(--muted);
}

/* ════════════════════════════════════════════════════════════
   SESSION SCREEN
════════════════════════════════════════════════════════════ */
.session-wrap {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ── Session header ── */
.session-header {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 4px) 16px 0;
}

.session-top-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 10px;
}
.session-end-btn {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--sub);
  font-size: 14px;
  font-weight: 600;
  width: 40px; height: 40px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.session-end-btn:active { border-color: var(--orange); color: var(--orange); }

.session-ex-name-btn {
  flex: 1;
  background: transparent;
  border: none;
  text-align: left;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px;
  font-weight: 900;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
  padding: 0;
  /* hint that it's tappable */
}
.session-ex-name-btn::after {
  content: " ···";
  font-size: 15px;
  color: var(--muted);
  font-weight: 400;
  vertical-align: middle;
}

.session-set-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--sub);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  white-space: nowrap;
  flex-shrink: 0;
}

.session-phase-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 10px;
}
.session-phase-txt {
  font-size: 12px;
  color: var(--sub);
  line-height: 1.3;
}

/* ── Rest timer bar ── */
.rest-bar {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.25s ease;
  background: var(--card);
  border-top: 1px solid var(--border);
  position: relative;
}
.rest-bar.rest-bar-visible { max-height: 56px; }
.rest-bar-fill {
  position: absolute;
  top: 0; left: 0;
  height: 3px;
  background: var(--green);
  transition: width 0.5s linear, background 0.3s;
}
.rest-bar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 16px;
  gap: 8px;
}
.rest-bar-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 26px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: 2px;
  min-width: 64px;
  text-align: center;
}
.rest-adj {
  background: var(--lift);
  border: 1px solid var(--border2);
  color: var(--sub);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 4px;
}
.rest-adj:active { color: var(--text); border-color: var(--yellow); }
.rest-skip {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 6px 4px;
}
.rest-skip:active { color: var(--text); }

/* ── Session body ── */
.session-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px;
}

.ex-tip-banner {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--sub);
  font-style: italic;
  margin-bottom: 12px;
  line-height: 1.4;
}

/* ── Sets table ── */
.sets-table {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.sets-header {
  display: grid;
  grid-template-columns: 44px 1fr 1fr 56px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
}
.sets-header span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
}
.sh-reps, .sh-weight { padding-left: 16px; }

/* ── Set row ── */
.set-row {
  display: grid;
  grid-template-columns: 44px 1fr 1fr 56px;
  align-items: center;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  gap: 6px;
  transition: opacity 0.2s;
}
.set-row:last-child { border-bottom: none; }
.set-row.set-done   { opacity: 0.38; }
.set-row.excluded   { opacity: 0.22; }

.sr-set {
  font-size: 13px;
  color: var(--sub);
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.sr-set em {
  font-style: normal;
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  line-height: 1.2;
}

/* Stepper */
.sr-stepper {
  display: flex;
  align-items: center;
  background: var(--lift);
  border: 1px solid var(--border2);
  border-radius: 8px;
  overflow: hidden;
  height: 52px;
}
.sr-step {
  background: transparent;
  border: none;
  color: var(--sub);
  font-size: 22px;
  font-weight: 300;
  width: 44px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  user-select: none;
  transition: background 0.08s, color 0.08s;
}
.sr-step:active { background: rgba(255,255,255,.06); color: var(--text); }

.sr-val {
  flex: 1;
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
  min-width: 0;
}
.sr-val.ghost { color: var(--muted); font-style: italic; }

/* BW label */
.sr-bw {
  grid-column: 2 / 4;
  font-size: 14px;
  color: var(--sub);
  font-style: italic;
  padding-left: 16px;
}

/* Skipped row */
.sr-skipped {
  grid-column: 2 / 4;
  font-size: 13px;
  color: var(--muted);
  font-style: italic;
  padding-left: 4px;
}
.sr-undo {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--sub);
  font-size: 11px;
  padding: 5px 8px;
  border-radius: 4px;
  width: 100%;
}
.sr-undo:active { color: var(--text); }

/* Circle done */
.sr-circle {
  width: 48px;
  height: 48px;
  min-width: 48px;
  min-height: 48px;
  max-width: 48px;
  max-height: 48px;
  border-radius: 50%;
  background: transparent;
  border: 2px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.12s;
  justify-self: center;
}
.sr-circle:active { border-color: var(--yellow); background: rgba(232,255,71,.1); transform: scale(0.92); }
.sr-circle.checked { background: var(--yellow); border-color: var(--yellow); }
.sr-circle.checked svg { stroke: #0f0f11; }
.sr-circle svg { width: 20px; height: 20px; }

/* ── Session bottom bar ── */
.session-bottom {
  flex-shrink: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px calc(var(--safe-bot) + 8px);
}

.ep-scroll {
  flex: 1;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.ep-scroll::-webkit-scrollbar { display: none; }

.ep {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--sub);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 7px 12px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.1s;
}
.ep:active   { opacity: 0.7; }
.ep.ep-active{ background: var(--yellow); border-color: var(--yellow); color: #0f0f11; }
.ep.ep-done  { opacity: 0.35; text-decoration: line-through; }

.btn-finish-session {
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--sub);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 9px 14px;
  border-radius: 8px;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.12s;
}
.btn-finish-session:active { opacity: 0.8; }
.btn-finish-ready {
  background: var(--yellow);
  border-color: var(--yellow);
  color: #0f0f11;
}

/* ── Add exercise ── */
.btn-add-exercise {
  width: calc(100% - 2px);
  margin: 12px 1px 0;
  background: transparent;
  border: 1.5px dashed var(--border2);
  border-radius: 8px;
  color: var(--sub);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: all 0.15s;
}
.btn-add-exercise:active { border-color: var(--yellow); color: var(--yellow); }

/* ════════════════════════════════════════════════════════════
   BOTTOM SHEETS
════════════════════════════════════════════════════════════ */
.sheet-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.72);
  z-index: 600;
  display: flex;
  align-items: flex-end;
}

.bottom-sheet {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 14px 14px 0 0;
  width: 100%;
  padding: 0 16px calc(var(--safe-bot) + 16px);
  display: flex;
  flex-direction: column;
}
.bottom-sheet-tall {
  max-height: 80dvh;
  overflow: hidden;
}

.bs-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 2px;
  margin: 10px auto 0;
  flex-shrink: 0;
}

.bs-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 900;
  text-transform: uppercase;
  color: var(--text);
  padding: 14px 0 6px;
  flex-shrink: 0;
}
.bs-sub {
  font-size: 13px;
  color: var(--sub);
  padding-bottom: 10px;
  flex-shrink: 0;
}

.bs-btn {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 15px;
  font-weight: 500;
  padding: 14px 16px;
  border-radius: 8px;
  text-align: left;
  margin-top: 8px;
  width: 100%;
  flex-shrink: 0;
  transition: background 0.1s;
}
.bs-btn:active       { background: var(--lift); }
.bs-btn-danger       { color: var(--orange); border-color: rgba(255,107,53,.25); }
.bs-btn-cancel       { color: var(--sub); }

/* Exercise picker */
.bs-search-row {
  padding: 10px 0 6px;
  flex-shrink: 0;
}
.bs-search-row input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  padding: 11px 14px;
}
.bs-search-row input:focus { outline: none; border-color: var(--yellow); }
.bs-search-row input::placeholder { color: var(--muted); }

.picker-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 12px;
  margin: 0 -16px;
  padding: 0 0 12px;
}
.picker-group {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px 4px;
}
.picker-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  text-align: left;
  transition: background 0.08s;
}
.picker-item:active { background: var(--card); }
.picker-name { font-size: 15px; color: var(--text); }
.picker-meta { font-size: 12px; color: var(--muted); }

/* ════════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(var(--safe-bot) + 24px);
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--lift);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 20px;
  border-radius: 6px;
  opacity: 0;
  transition: all 0.2s;
  z-index: 700;
  white-space: nowrap;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Sport log */
.sport-log { padding: 16px; }
.sport-log-label { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--sub); margin-bottom: 14px; }
.sport-fields { display: grid; gap: 14px; }
.sport-fields label { font-size: 12px; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; display: grid; gap: 6px; }
.sport-select, .set-input { background: var(--card); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-size: 16px; padding: 10px 12px; width: 100%; }
</style>
</head>
