/* ── SHEETS ── */
.sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:400; display:flex; align-items:flex-end; }
.confirm-sheet { background:var(--card); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; padding:20px 16px calc(var(--safe-bot) + 20px); display:flex; flex-direction:column; gap:8px; }
.confirm-sheet-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--sub); margin-bottom:4px; }
.confirm-action { background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:16px; font-weight:500; padding:14px 16px; border-radius:8px; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.confirm-action:active { background:var(--lift); }
.confirm-action.danger { color:var(--orange); }
.confirm-action.muted { color:var(--sub); }
.ex-menu-sheet { background:var(--card); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; padding:20px 16px calc(var(--safe-bot) + 20px); }
.ex-menu-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; color:var(--text); margin-bottom:16px; letter-spacing:0.3px; }
.ex-menu-btn { display:block; width:100%; background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; font-weight:500; padding:13px 16px; border-radius:8px; cursor:pointer; text-align:left; margin-bottom:8px; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.ex-menu-btn:active { background:var(--lift); }
.ex-menu-btn.danger { color:var(--orange); border-color:rgba(255,107,53,.3); }
.ex-menu-cancel { display:block; width:100%; background:transparent; border:1px solid var(--border2); color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:12px 16px; border-radius:8px; cursor:pointer; text-align:center; margin-top:4px; -webkit-tap-highlight-color:transparent; }
/* Full-screen exercise picker */
.ex-picker-fullscreen { position:fixed; inset:0; background:var(--bg); z-index:400; display:flex; flex-direction:column; }
.ex-picker-head { display:flex; align-items:center; gap:12px; padding:calc(var(--safe-top) + 8px) 16px 12px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.ex-picker-back { background:transparent; border:1px solid var(--border2); color:var(--sub); font-size:18px; width:36px; height:36px; border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
.ex-picker-title { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--text); }
.ex-picker-search { padding:10px 14px; flex-shrink:0; background:var(--surface); border-bottom:1px solid var(--border); }
.ex-picker-search input { width:100%; background:var(--card2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:15px; padding:10px 12px; }
.ex-picker-search input:focus { outline:none; border-color:var(--yellow); }
.ex-picker-search input::placeholder { color:var(--muted); }
.ex-picker-list { overflow-y:auto; flex:1; padding-bottom:calc(var(--safe-bot) + 16px); -webkit-overflow-scrolling:touch; }
.sheet-group-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); padding:10px 16px 4px; }
.sheet-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.sheet-item:last-child { border-bottom:none; }
.sheet-item:active { background:var(--card2); }
.sheet-item-name { font-size:15px; font-weight:500; color:var(--text); }
.sheet-item-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.sheet-item-add { color:var(--yellow); font-size:22px; flex-shrink:0; }

/* ── STATS & HISTORY PAGES ── */
.page-header-compact { padding:0 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.compact-date-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.compact-date { font-size:13px; color:var(--sub); }
.page-title-compact { font-family:'Barlow',sans-serif; font-size:34px; font-weight:700; color:var(--text); letter-spacing:-0.5px; line-height:1; }

/* ── SWIPE TO DELETE ── */
.sr-swipe-wrap { position:relative; overflow:hidden; border-bottom:1px solid var(--border); }
.sr-swipe-wrap:last-of-type { border-bottom:none; }
.sr-swipe-wrap .sr { border-bottom:none; transition:transform 0.15s ease; }
.sr-delete-reveal { position:absolute; right:0; top:0; bottom:0; width:84px; background:var(--red); color:#fff; border:none; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transform:translateX(84px); transition:transform 0.15s ease; }
.sr-swipe-wrap.swiped .sr { transform:translateX(-84px); }
.sr-swipe-wrap.swiped .sr-delete-reveal { transform:translateX(0); }

/* ── TOAST ── */
#toast { position:fixed; bottom:calc(var(--nav-h) + var(--safe-bot) + 12px); left:50%; transform:translateX(-50%) translateY(16px); background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:10px 20px; border-radius:4px; opacity:0; transition:all 0.2s; z-index:600; white-space:nowrap; pointer-events:none; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── FINISH SCREEN V2 ── */
#finv2 {
  position:fixed; inset:0; z-index:500;
  background:
    radial-gradient(circle at 50% 20%, rgba(232,255,71,.10), transparent 50%),
    radial-gradient(circle at 50% 80%, rgba(255,107,53,.06), transparent 55%),
    var(--bg);
  display:flex; flex-direction:column;
  animation:finv2In 0.35s ease-out;
  overflow:hidden;
}
#confetti-canvas { position:absolute; inset:0; pointer-events:none; z-index:0; }
.finv2-bg-dots {
  position:absolute; inset:0; pointer-events:none; opacity:.5;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(232,255,71,.6) 0, transparent 1px),
    radial-gradient(circle at 78% 22%, rgba(255,107,53,.6) 0, transparent 1px),
    radial-gradient(circle at 22% 78%, rgba(91,164,255,.5) 0, transparent 1px),
    radial-gradient(circle at 88% 65%, rgba(232,255,71,.5) 0, transparent 1px),
    radial-gradient(circle at 55% 12%, rgba(61,255,160,.6) 0, transparent 1px),
    radial-gradient(circle at 8% 50%, rgba(184,127,255,.5) 0, transparent 1px),
    radial-gradient(circle at 92% 88%, rgba(232,255,71,.5) 0, transparent 1px);
  background-size: 6px 6px;
}
.finv2-inner {
  flex:1 1 auto;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
  max-width:480px;
  margin:0 auto;
  width:100%;
  min-height:0;
}
.finv2-header { flex-shrink:0; padding:calc(var(--safe-top) + 20px) 22px 0; }
.finv2-scroll { flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 22px; }
.finv2-footer { flex-shrink:0; padding:14px 22px calc(var(--safe-bot) + 16px); background:linear-gradient(180deg, transparent 0%, var(--bg) 24%); position:relative; }

.finv2-eyebrow {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase;
  color:var(--green); margin-bottom:4px;
  display:flex; align-items:center; gap:8px;
  animation:finv2Slide 0.4s ease-out 0.15s both;
}
.finv2-eyebrow::before { content:""; width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(61,255,160,.6); }

.finv2-day-name {
  font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:900;
  color:var(--text); letter-spacing:-0.5px;
  line-height:0.95; text-transform:uppercase; margin-bottom:14px;
  animation:finv2Slide 0.4s ease-out 0.25s both;
}

.finv2-meta-line {
  font-family:'JetBrains Mono', monospace;
  font-size:13px; font-weight:700; color:var(--muted); letter-spacing:0.5px;
  margin-bottom:22px; display:flex; align-items:center; gap:10px;
  animation:finv2Slide 0.4s ease-out 0.3s both;
}
.finv2-pip { color:#333; }

/* Headline card */
.finv2-headline {
  background:linear-gradient(135deg, rgba(232,255,71,.12), rgba(232,255,71,.02));
  border:1px solid rgba(232,255,71,.4);
  border-radius:14px;
  padding:18px;
  margin-bottom:14px;
  position:relative; overflow:hidden;
  animation:finv2Slide 0.4s ease-out 0.4s both;
}
.finv2-headline::before {
  content:""; position:absolute; top:-30px; right:-30px;
  width:140px; height:140px;
  background:radial-gradient(circle, rgba(232,255,71,.2), transparent 60%);
}
.finv2-headline.finv2-headline-pr { animation:finv2Slide 0.4s ease-out 0.4s both, headlineGlow 2.5s ease-in-out 1s infinite; }
.finv2-headline.finv2-headline-volume,
.finv2-headline.finv2-headline-reps {
  background:linear-gradient(135deg, rgba(61,255,160,.10), rgba(61,255,160,.02));
  border-color:rgba(61,255,160,.35);
}
.finv2-headline.finv2-headline-volume::before,
.finv2-headline.finv2-headline-reps::before { background:radial-gradient(circle, rgba(61,255,160,.18), transparent 60%); }
.finv2-headline.finv2-headline-default {
  background:var(--card);
  border-color:var(--border);
}
.finv2-headline.finv2-headline-default::before { display:none; }
.finv2-headline-lbl {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--yellow); margin-bottom:8px;
  display:inline-block; padding:3px 8px; border-radius:3px;
  background:rgba(232,255,71,.15);
  position:relative; z-index:1;
}
.finv2-headline-volume .finv2-headline-lbl, .finv2-headline-reps .finv2-headline-lbl {
  color:var(--green); background:rgba(61,255,160,.15);
}
.finv2-headline-default .finv2-headline-lbl { color:var(--muted); background:rgba(120,120,120,.1); }
.finv2-headline-main {
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px; font-weight:900; color:var(--text);
  line-height:1.15; letter-spacing:-0.3px;
  position:relative; z-index:1;
}
.finv2-headline-main .accent { color:var(--yellow); }
.finv2-headline-volume .finv2-headline-main .accent, .finv2-headline-reps .finv2-headline-main .accent { color:var(--green); }
.finv2-headline-sub {
  margin-top:8px; font-size:13px; color:var(--sub); line-height:1.4;
  position:relative; z-index:1;
}

/* Stats grid */
.finv2-stats {
  display:grid; grid-template-columns:1fr 1fr; gap:8px;
  margin-bottom:14px;
  animation:finv2Slide 0.4s ease-out 0.5s both;
}
.finv2-stat { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
.finv2-stat-lbl { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.finv2-stat-val { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; color:var(--text); line-height:1; }
.finv2-stat-unit { font-size:12px; font-weight:700; color:var(--muted); letter-spacing:1px; margin-left:4px; }
.finv2-delta-line { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; margin-top:4px; }
.finv2-delta-line.up { color:var(--green); }
.finv2-delta-line.flat { color:var(--muted); }
.finv2-delta-line.down { color:var(--orange); }

/* Compare card */
.finv2-compare {
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px; margin-bottom:16px;
  animation:finv2Slide 0.4s ease-out 0.6s both;
}
.finv2-compare-head {
  font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase;
  color:var(--muted); margin-bottom:10px;
  display:flex; align-items:center; justify-content:space-between;
}
.finv2-compare-row {
  display:grid; grid-template-columns:1fr auto auto; gap:10px;
  padding:7px 0; align-items:center;
  border-bottom:1px dashed #222;
}
.finv2-compare-row:last-child { border-bottom:none; }
.finv2-name {
  font-size:13px; color:var(--sub); font-weight:500;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.finv2-vals { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--muted); letter-spacing:0.5px; }
.finv2-vals strong { color:var(--text); font-weight:700; }
.finv2-was { color:var(--muted); }
.finv2-delta {
  font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:900; letter-spacing:1px;
  padding:2px 7px; border-radius:3px; min-width:36px; text-align:center;
}
.finv2-delta-up { background:rgba(61,255,160,.12); color:var(--green); }
.finv2-delta-flat { background:rgba(120,120,120,.08); color:var(--muted); }
.finv2-delta-down { background:rgba(255,107,53,.1); color:var(--orange); }

/* Bottom */
.finv2-bottom { display:none; } /* legacy, replaced by .finv2-footer */
.finv2-quote {
  font-family:'Barlow',sans-serif; font-size:14px; font-style:italic;
  color:var(--sub); line-height:1.45; padding:18px 4px 6px 12px; position:relative;
  margin-top:8px;
}
.finv2-quote::before {
  content:"\201C"; position:absolute; left:0; top:8px;
  color:var(--yellow); font-size:32px; font-family:serif; line-height:1;
}
.finv2-actions { display:flex; gap:8px; }
.finv2-share {
  flex:0 0 auto; background:transparent; border:1px solid var(--border2); color:var(--sub);
  padding:14px 16px; border-radius:10px;
  font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  -webkit-tap-highlight-color:transparent;
}
.finv2-share:active { border-color:var(--yellow); color:var(--yellow); }
.finv2-cta {
  flex:1; background:var(--yellow); color:#0a0a0a; border:none; padding:16px;
  border-radius:10px;
  font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase;
  cursor:pointer; -webkit-tap-highlight-color:transparent;
  transition:transform 0.08s;
}
.finv2-cta:active { transform:scale(0.97); }

@keyframes finv2In { from { opacity:0; } to { opacity:1; } }
@keyframes finv2Slide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes headlineGlow { 0%,100% { box-shadow:0 0 0 rgba(232,255,71,0); } 50% { box-shadow:0 0 20px rgba(232,255,71,.2); } }

/* ── LEGACY FINISH CELEBRATION (kept for fallback) ── */
#finish-screen { position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; align-items:center; justify-content:center; overflow:hidden; animation:finishFadeIn 0.3s ease-out; }
.finish-inner { position:relative; padding:calc(var(--safe-top) + 24px) 24px calc(var(--safe-bot) + 24px); width:100%; max-width:480px; display:flex; flex-direction:column; align-items:center; text-align:center; }
.finish-check { animation:finishPop 0.5s cubic-bezier(.34,1.56,.64,1) 0.1s both; margin-bottom:18px; }
.finish-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--green); margin-bottom:6px; animation:finishSlide 0.4s ease-out 0.3s both; }
.finish-title { font-family:'Barlow Condensed',sans-serif; font-size:38px; font-weight:900; text-transform:uppercase; color:var(--text); line-height:1.05; letter-spacing:-0.5px; margin-bottom:14px; animation:finishSlide 0.4s ease-out 0.4s both; }
.finish-motivation { font-size:15px; color:var(--sub); font-style:italic; line-height:1.45; margin-bottom:28px; max-width:340px; animation:finishSlide 0.4s ease-out 0.5s both; }
.finish-stats { display:flex; gap:14px; width:100%; max-width:380px; margin-bottom:18px; animation:finishSlide 0.4s ease-out 0.6s both; }
.finish-stat { flex:1; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 8px; }
.finish-stat-num { font-family:'Barlow Condensed',sans-serif; font-size:32px; font-weight:900; color:var(--text); line-height:1; }
.finish-stat-lbl { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:4px; }
.finish-volume { font-family:'Barlow Condensed',sans-serif; font-size:34px; font-weight:900; color:var(--yellow); margin-bottom:16px; animation:finishSlide 0.4s ease-out 0.7s both; }
.finish-unit { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-left:6px; }
.finish-pr { background:linear-gradient(90deg, rgba(232,255,71,.12), rgba(232,255,71,.04)); border:1px solid var(--yellow); border-radius:10px; padding:12px 16px; margin-bottom:24px; display:flex; align-items:center; gap:12px; animation:finishSlide 0.4s ease-out 0.8s both, prGlow 2s ease-in-out 1s infinite; }
.finish-pr-badge { background:var(--yellow); color:#0a0a0a; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:900; letter-spacing:2px; padding:4px 8px; border-radius:4px; flex-shrink:0; }
.finish-pr-text { color:var(--text); font-size:14px; font-weight:600; }
.finish-pr-diff { color:var(--yellow); font-weight:700; }
.finish-cta { background:var(--yellow); border:none; color:#0a0a0a; font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; letter-spacing:2.5px; text-transform:uppercase; padding:18px 48px; border-radius:10px; cursor:pointer; -webkit-tap-highlight-color:transparent; min-width:220px; animation:finishSlide 0.4s ease-out 0.9s both; transition:transform 0.08s; }
.finish-cta:active { transform:scale(0.97); }

@keyframes finishFadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes finishPop { 0%{transform:scale(0);} 60%{transform:scale(1.15);} 100%{transform:scale(1);} }
@keyframes finishSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes prGlow { 0%,100% { box-shadow:0 0 0 rgba(232,255,71,0); } 50% { box-shadow:0 0 16px rgba(232,255,71,.25); } }

/* ── STATS V2 ── */
.stats-page { overflow-y:auto; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; padding-left:0; padding-right:0; }
.statsv2-top { position:sticky; top:0; z-index:50; background:var(--bg); padding:6px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.statsv2-title-row { padding-bottom:10px; }
.statsv2-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.statsv2-title { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:900; color:var(--text); letter-spacing:-0.5px; line-height:1; text-transform:uppercase; }
#stats-content { padding:16px; flex:1; }

/* BW hero */
.bwv2-hero { background:linear-gradient(135deg,rgba(232,255,71,.10),rgba(232,255,71,.02)); border:1px solid rgba(232,255,71,.35); border-radius:14px; padding:18px; margin-bottom:14px; position:relative; overflow:hidden; }
.bwv2-hero::before { content:""; position:absolute; top:-30px; right:-30px; width:140px; height:140px; background:radial-gradient(circle,rgba(232,255,71,.18),transparent 60%); pointer-events:none; }
.bwv2-hero-lbl { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; position:relative; z-index:1; }
.bwv2-hero-val { font-family:'Barlow Condensed',sans-serif; font-size:48px; font-weight:900; color:var(--text); line-height:0.95; letter-spacing:-1.5px; position:relative; z-index:1; }
.bwv2-hero-unit { font-size:18px; color:var(--sub); font-weight:700; margin-left:6px; letter-spacing:1px; }
.bwv2-hero-meta { display:flex; gap:14px; padding-top:14px; margin-top:14px; border-top:1px dashed rgba(232,255,71,.2); font-family:'Barlow Condensed',sans-serif; position:relative; z-index:1; flex-wrap:wrap; }
.bwv2-meta-pair { display:flex; flex-direction:column; gap:2px; }
.bwv2-meta-pair .lbl { font-size:9px; font-weight:700; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.bwv2-meta-pair .val { font-size:14px; font-weight:700; color:var(--text); }
.bwv2-meta-pair .val.green { color:var(--green); }
.bwv2-meta-pair .green { color:var(--green); }
.bwv2-meta-pair .orange { color:var(--orange); }
.bwv2-meta-pair .flat { color:var(--muted); }

/* BW log strip */
.bwv2-log-strip { display:flex; gap:8px; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:12px; align-items:center; }
.bwv2-log-input { flex:0 0 72px; background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; padding:10px 10px; min-width:0; }
.bwv2-log-input::placeholder { color:var(--muted); font-weight:400; }
.bwv2-log-unit { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; flex-shrink:0; }
.bwv2-log-date { flex:1; background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--sub); font-size:13px; padding:11px 10px; min-width:0; }
.bwv2-log-save { background:var(--yellow); color:#0a0a0a; border:none; border-radius:8px; padding:11px 16px; font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:900; letter-spacing:2px; text-transform:uppercase; flex-shrink:0; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity .1s; }
.bwv2-log-save:active { opacity:.8; }

/* BW range */
.bwv2-range { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:12px; }
.bwv2-range-btn { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 0; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all .12s; }
.bwv2-range-btn.active { background:var(--yellow); color:#0a0a0a; border-color:var(--yellow); }

/* BW chart card */
.bwv2-chart-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:14px; }
.bwv2-chart-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px; }
.bwv2-chart-lbl { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
.bwv2-chart-trend { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:4px; }
.bwv2-chart-trend.down { background:rgba(61,255,160,.1); color:var(--green); }
.bwv2-chart-trend.up { background:rgba(255,107,53,.1); color:var(--orange); }

/* BW history */
.bwv2-hist-head { display:flex; align-items:center; justify-content:space-between; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin:14px 4px 8px; }
.bwv2-hist-head .count { color:var(--sub); }
.bwv2-hist { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.bwv2-hist-row { display:grid; grid-template-columns:1fr auto auto auto; align-items:center; gap:12px; padding:12px 14px; border-bottom:1px solid var(--border); }
.bwv2-hist-row:last-child { border-bottom:none; }
.bwv2-hist-date { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.5px; color:var(--sub); }
.bwv2-hist-val { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; color:var(--text); letter-spacing:-0.3px; }
.bwv2-hist-unit { font-size:10px; color:var(--muted); font-weight:700; margin-left:3px; letter-spacing:1px; text-transform:uppercase; }
.bwv2-delta { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:900; letter-spacing:1px; padding:2px 7px; border-radius:3px; min-width:38px; text-align:center; }
.bwv2-delta.down { background:rgba(61,255,160,.12); color:var(--green); }
.bwv2-delta.up { background:rgba(255,107,53,.1); color:var(--orange); }
.bwv2-delta.flat { background:rgba(120,120,120,.08); color:var(--muted); }
.bwv2-hist-del { background:transparent; border:none; color:var(--muted); font-size:14px; cursor:pointer; padding:4px 8px; -webkit-tap-highlight-color:transparent; transition:color .1s; }
.bwv2-hist-del:active { color:var(--red); }

/* ── HISTORY V2 ── */
.hist-page { overflow-y:auto; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; padding-left:0; padding-right:0; }
.histv2-top { position:sticky; top:0; z-index:50; background:var(--bg); padding:6px 16px 0; border-bottom:1px solid var(--border); flex-shrink:0; }
.histv2-eyebrow { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
.histv2-title { font-family:'Barlow Condensed',sans-serif; font-size:30px; font-weight:900; color:var(--text); letter-spacing:-0.5px; line-height:1; text-transform:uppercase; margin-bottom:8px; }
.histv2-summary-strip { display:flex; gap:8px; padding:10px 0 12px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
.histv2-summary-strip::-webkit-scrollbar { display:none; }
.histv2-sum-loading { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--muted); padding:4px 0; }
.histv2-sum { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; flex-shrink:0; min-width:72px; }
.histv2-sum-wide { min-width:96px; }
.histv2-sum-lbl { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
.histv2-sum-val { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; color:var(--text); line-height:1; margin-top:2px; }
.histv2-sum-val.green { color:var(--green); }
.histv2-sum-val.yellow { color:var(--yellow); }
.histv2-sum-unit { font-size:9px; color:var(--muted); font-weight:700; letter-spacing:1px; margin-left:3px; text-transform:uppercase; }
.histv2-body { padding:16px; flex:1; }

/* Group headers */
.histv2-group-head { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin:4px 0 10px; display:flex; align-items:center; justify-content:space-between; }
.histv2-group-head:not(:first-child) { margin-top:22px; }
.histv2-group-head .ct { color:var(--sub); }

/* Session cards */
.histv2-card { background:var(--card); border:1px solid var(--border); border-radius:12px; margin-bottom:8px; overflow:hidden; }
.histv2-card-head { display:grid; grid-template-columns:1fr auto; align-items:center; padding:12px 14px; gap:12px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.histv2-card-l { min-width:0; }
.histv2-day-top { display:flex; align-items:baseline; gap:8px; font-family:'Barlow Condensed',sans-serif; margin-bottom:3px; }
.histv2-day-date { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--yellow); }
.histv2-day-dot { color:#333; font-size:9px; }
.histv2-day-time { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:0.5px; }
.histv2-day-name { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:900; text-transform:uppercase; color:var(--text); letter-spacing:-0.2px; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.histv2-card-stats { display:flex; align-items:center; gap:12px; }
.histv2-stat-mini { text-align:right; }
.histv2-stat-mini .v { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:900; color:var(--text); line-height:1; }
.histv2-stat-mini .l { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-top:2px; }
.histv2-chev { color:var(--muted); font-size:13px; flex-shrink:0; }

/* Pill preview */
.histv2-card-preview { padding:10px 14px 12px; display:flex; gap:5px; flex-wrap:wrap; }
.histv2-lift-pill { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.5px; background:var(--card2); border:1px solid var(--border2); padding:4px 9px; border-radius:99px; color:var(--sub); }
.histv2-lift-pill strong { color:var(--text); font-weight:900; margin-left:4px; }
.histv2-lift-pill.pr { background:rgba(232,255,71,.06); border-color:rgba(232,255,71,.35); color:var(--yellow); }
.histv2-lift-pill.pr::before { content:"★ "; }
.histv2-lift-pill.pr strong { color:var(--yellow); }

/* Expanded view */
.histv2-card-expand { max-height:0; overflow:hidden; transition:max-height .3s ease; }
.histv2-card-expand.open { max-height:2000px; padding-bottom:12px; }
.histv2-ex-block { padding:10px 14px 4px; border-top:1px solid var(--border); }
.histv2-ex-name { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--text); margin-bottom:8px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.histv2-ex-pr { color:var(--yellow); font-size:10px; }
.histv2-ex-best { color:var(--muted); font-size:10px; font-weight:700; margin-left:auto; }
.histv2-ex-sets { display:flex; gap:5px; flex-wrap:wrap; }
.histv2-set-pill { display:inline-flex; align-items:center; gap:4px; background:var(--card2); border:1px solid var(--border2); padding:4px 8px; border-radius:6px; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; color:var(--sub); letter-spacing:0.3px; }
.histv2-set-pill .n { color:var(--muted); font-size:9px; letter-spacing:1.5px; padding-right:4px; border-right:1px solid var(--border2); margin-right:2px; }
.histv2-set-pill.warm { background:rgba(91,164,255,.05); border-color:rgba(91,164,255,.2); color:var(--blue); }
.histv2-set-pill.best { background:rgba(232,255,71,.06); border-color:rgba(232,255,71,.3); color:var(--yellow); }
