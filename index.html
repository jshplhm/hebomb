<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f11">
<title>Hebomb</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:      #0d0f11;
  --surface: #13161a;
  --card:    #191d22;
  --card2:   #1e232a;
  --lift:    #252b34;
  --border:  #272d37;
  --border2: #333b47;
  --text:    #eef0f3;
  --sub:     #7d8799;
  --muted:   #4a5262;
  --yellow:  #e8ff47;
  --orange:  #ff6b35;
  --green:   #3dffa0;
  --blue:    #5ba4ff;
  --red:     #ff4455;
  --nav-h:   64px;
  --safe-bot: env(safe-area-inset-bottom, 20px);
  --safe-top: env(safe-area-inset-top, 44px);
}

html { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; font-size:16px; -webkit-text-size-adjust:100%; }
body { background:var(--bg); overscroll-behavior:none; -webkit-font-smoothing:antialiased; }
input,select,button { font-family:inherit; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
input[type=number] { -moz-appearance:textfield; }

/* ── APP SHELL ── */
#app { max-width:480px; margin:0 auto; min-height:100dvh; }
.page,.picker-page { padding:0 16px calc(var(--nav-h) + var(--safe-bot) + 16px); }
.session-loading { display:flex; align-items:center; justify-content:center; height:100dvh; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }

/* ── NAV ── */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:calc(var(--nav-h) + var(--safe-bot)); background:var(--surface); border-top:1px solid var(--border); display:flex; align-items:flex-start; z-index:100; }
.nav-btn { flex:1; height:var(--nav-h); background:transparent; border:none; color:var(--muted); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; transition:color 0.1s; -webkit-tap-highlight-color:transparent; }
.nav-btn.active { color:var(--yellow); }
.nav-icon { width:22px; height:22px; display:block; }
.nav-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }

/* ── PICKER PAGE ── */
.picker-page { padding-top:calc(var(--safe-top) + 16px); }
.picker-greeting { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.picker-hi { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--text); letter-spacing:-0.3px; line-height:1; }
.picker-subline { font-size:14px; color:var(--sub); margin-bottom:24px; }
/* Day list — no suggestion, equal weight */
.picker-day-list { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
.picker-day-card { display:flex; align-items:center; justify-content:space-between; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px 18px; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; transition:border-color 0.12s, background 0.12s; width:100%; }
.picker-day-card:active { border-color:var(--yellow); background:var(--card2); }
.picker-day-card-left { display:flex; flex-direction:column; gap:5px; }
.picker-day-title { font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:900; text-transform:uppercase; color:var(--text); letter-spacing:-0.3px; line-height:1; }
.picker-day-last { font-size:12px; color:var(--muted); }
.picker-day-arrow { font-size:20px; color:var(--border2); flex-shrink:0; }
.btn-start { width:100%; background:var(--yellow); color:#0a0a0a; border:none; border-radius:6px; font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:16px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:opacity 0.1s; }
.btn-start:active { opacity:0.75; }

.picker-past { display:flex; align-items:center; gap:10px; }
.picker-past-label { font-size:13px; color:var(--muted); white-space:nowrap; }
.picker-date-input { flex:1; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--sub); font-size:14px; padding:9px 12px; }
.picker-date-input:focus { outline:none; border-color:var(--yellow); }

/* ── SESSION SHELL ── */
#session-wrap { display:flex; flex-direction:column; height:100dvh; background:var(--bg); position:relative; overflow:hidden; }

/* ── SESSION HEADER ── */
.sess-header { background:var(--surface); border-bottom:1px solid var(--border); padding:calc(var(--safe-top) + 6px) 16px 8px; flex-shrink:0; }
.sess-hdr-row { display:flex; align-items:center; gap:10px; }
.sess-end { background:transparent; border:none; color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:4px 0; cursor:pointer; -webkit-tap-highlight-color:transparent; white-space:nowrap; flex-shrink:0; }
.sess-end:active { color:var(--sub); }
.sess-ex-name { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; text-transform:uppercase; color:var(--text); line-height:1; background:transparent; border:none; padding:0; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.sess-ex-name::after { content:" ···"; font-size:11px; color:var(--muted); font-weight:400; font-family:'Barlow',sans-serif; }
.sess-counter-block { text-align:right; flex-shrink:0; }
.sess-counter { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; letter-spacing:1px; color:var(--text); }
/* Set progress dots */
.sess-dots-row { display:flex; align-items:center; gap:5px; padding:5px 0 0; min-height:0; }
.sdot { display:inline-block; border-radius:50%; flex-shrink:0; }
.sdot-done { width:8px; height:8px; background:var(--yellow); }
.sdot-next { width:9px; height:9px; background:transparent; border:2px solid var(--yellow); }
.sdot-up   { width:7px; height:7px; background:transparent; border:1.5px solid var(--border2); }
.sdot-warm { width:5px; height:5px; background:var(--muted); }

/* ── FOCUS ZONE ── */
.sess-focus { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 20px; gap:20px; overflow:hidden; }

/* Big reps × weight */
.sf-big-row { display:flex; align-items:center; justify-content:center; gap:12px; }
.sf-x { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:300; color:var(--border2); flex-shrink:0; }
.sf-field { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.sf-field-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
.sf-big-num { font-family:'Barlow Condensed',sans-serif; font-size:84px; font-weight:900; color:var(--text); line-height:1; letter-spacing:-2px; text-align:center; min-width:100px; }
.sf-steppers { display:flex; gap:8px; }
.sf-step-btn { width:52px; height:40px; background:var(--card2); border:1px solid var(--border2); border-radius:8px; color:var(--sub); font-size:22px; font-weight:300; cursor:pointer; display:flex; align-items:center; justify-content:center; -webkit-tap-highlight-color:transparent; transition:background 0.1s, color 0.1s; }
.sf-step-btn:active { background:var(--lift); color:var(--yellow); }

/* Rest timer card */
.sf-rest-card { background:var(--card); border:1px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color 0.4s, background 0.4s; }
.sf-rest-card.sf-rest-over { border-color:rgba(255,107,53,.4); background:rgba(255,107,53,.05); }
.sf-rest-bar-track { height:2px; background:var(--border); position:relative; }
.sf-rest-bar { height:100%; width:0%; background:var(--green); transition:width 0.5s linear, background 0.6s; }
.sf-rest-inner { display:flex; align-items:center; gap:8px; padding:10px 14px; }
.sf-rest-lbl { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); flex-shrink:0; }
.sf-rest-time { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; color:var(--muted); letter-spacing:1px; flex:1; text-align:center; transition:color 0.4s, font-size 0.2s; }
.sf-rest-adj { display:flex; gap:6px; }
.sf-rest-btn { background:var(--card2); border:1px solid var(--border2); color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:1px; padding:5px 10px; border-radius:4px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
.sf-rest-btn:active { border-color:rgba(232,255,71,.4); color:var(--text); }

/* ── EXERCISE QUEUE ── */
.sess-queue { display:flex; gap:6px; overflow-x:auto; padding:8px 14px; border-top:1px solid var(--border); flex-shrink:0; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.sess-queue::-webkit-scrollbar { display:none; }
.sq-pill { flex-shrink:0; padding:5px 12px; border-radius:20px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; cursor:pointer; white-space:nowrap; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.sq-pill:active { border-color:var(--yellow); color:var(--yellow); }
.sq-active { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a !important; }
.sq-done { opacity:0.35; text-decoration:line-through; }
.sq-partial { border-color:var(--yellow); color:var(--yellow); }

/* ── SESSION BOTTOM BAR ── */
.sess-bottom { flex-shrink:0; background:var(--surface); border-top:1px solid var(--border); padding:10px 14px calc(var(--safe-bot) + 10px); display:flex; gap:8px; }
.sess-add-ex-btn { flex:0 0 auto; background:transparent; border:1.5px dashed var(--border2); color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:11px 14px; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; -webkit-tap-highlight-color:transparent; transition:all 0.15s; white-space:nowrap; }
.sess-add-ex-btn:active { border-color:var(--yellow); color:var(--yellow); }
.sess-done-btn { flex:1; background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:14px; border-radius:6px; cursor:pointer; -webkit-tap-highlight-color:transparent; transition:all 0.15s; }
.sess-done-btn:active { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a; transform:scale(0.97); }
.sess-done-btn.ready { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a; }

/* ── SHEETS (exercise picker, confirm, ex menu) ── */
.sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:400; display:flex; align-items:flex-end; }

/* Confirm sheet */
.confirm-sheet { background:var(--card); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; padding:20px 16px calc(var(--safe-bot) + 20px); display:flex; flex-direction:column; gap:8px; }
.confirm-sheet-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--sub); margin-bottom:4px; }
.confirm-action { background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:16px; font-weight:500; padding:14px 16px; border-radius:8px; cursor:pointer; text-align:left; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.confirm-action:active { background:var(--lift); }
.confirm-action.danger { color:var(--orange); }
.confirm-action.muted { color:var(--sub); }

/* Exercise menu sheet */
.ex-menu-sheet { background:var(--card); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; padding:20px 16px calc(var(--safe-bot) + 20px); }
.ex-menu-name { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; text-transform:uppercase; color:var(--text); margin-bottom:16px; letter-spacing:0.3px; }
.ex-menu-btn { display:block; width:100%; background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; font-weight:500; padding:13px 16px; border-radius:8px; cursor:pointer; text-align:left; margin-bottom:8px; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.ex-menu-btn:active { background:var(--lift); }
.ex-menu-btn.danger { color:var(--orange); border-color:rgba(255,107,53,.3); }
.ex-menu-cancel { display:block; width:100%; background:transparent; border:1px solid var(--border2); color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:12px 16px; border-radius:8px; cursor:pointer; text-align:center; margin-top:4px; -webkit-tap-highlight-color:transparent; }

/* Exercise picker sheet */
.sheet { background:var(--surface); border:1px solid var(--border); border-radius:12px 12px 0 0; width:100%; max-height:80dvh; display:flex; flex-direction:column; overflow:hidden; }
.sheet-handle { width:36px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
.sheet-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
.sheet-title { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; letter-spacing:2px; text-transform:uppercase; }
.sheet-close { background:transparent; border:none; color:var(--sub); font-size:20px; cursor:pointer; padding:2px 6px; -webkit-tap-highlight-color:transparent; }
.sheet-search { padding:10px 14px; flex-shrink:0; }
.sheet-search input { width:100%; background:var(--card2); border:1px solid var(--border2); border-radius:6px; color:var(--text); font-size:15px; padding:10px 12px; }
.sheet-search input:focus { outline:none; border-color:var(--yellow); }
.sheet-search input::placeholder { color:var(--muted); }
.sheet-list { overflow-y:auto; flex:1; padding:6px 0 calc(var(--safe-bot)+16px); -webkit-overflow-scrolling:touch; }
.sheet-group-label { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); padding:10px 16px 4px; }
.sheet-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); cursor:pointer; -webkit-tap-highlight-color:transparent; transition:background 0.1s; }
.sheet-item:last-child { border-bottom:none; }
.sheet-item:active { background:var(--card2); }
.sheet-item-name { font-size:15px; font-weight:500; color:var(--text); }
.sheet-item-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.sheet-item-add { color:var(--yellow); font-size:22px; flex-shrink:0; }

/* ── PHASE BADGES ── */
.phase-badge-strength     { background:var(--yellow); color:#0a0a0a; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-hypertrophy  { background:var(--orange); color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-conditioning  { background:rgba(61,255,160,.1); color:var(--green); border:1px solid rgba(61,255,160,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-deload        { background:rgba(91,164,255,.1); color:var(--blue); border:1px solid rgba(91,164,255,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }
.phase-badge-peak          { background:rgba(184,127,255,.1); color:#b87fff; border:1px solid rgba(184,127,255,.3); font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:4px; }

/* ── STATS & HISTORY ── */
.page-header-compact { padding:calc(var(--safe-top)+8px) 0 16px; border-bottom:1px solid var(--border); margin-bottom:20px; }
.compact-date-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
.compact-date { font-size:13px; color:var(--sub); }
.page-title-compact { font-family:'Barlow',sans-serif; font-size:34px; font-weight:700; color:var(--text); letter-spacing:-0.5px; line-height:1; }
.stats-tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-bottom:18px; background:var(--card); border:1px solid var(--border); border-radius:6px; padding:5px; }
.stats-tab { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:9px 4px; border:none; background:transparent; color:var(--sub); cursor:pointer; border-radius:3px; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.stats-tab.active { background:var(--yellow); color:#0a0a0a; }
.loading-text { text-align:center; padding:30px 0; color:var(--sub); font-size:14px; }
.loading-text.muted { color:var(--muted); }
.section-head-plain { font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin:16px 0 10px; }
.chart-block { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:14px; margin-bottom:10px; }
.chart-title { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--sub); }
.chart-title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.chart-trend { font-size:12px; color:var(--sub); }
.svg-chart-wrap { display:flex; gap:8px; align-items:stretch; }
.svg-chart { flex:1; height:90px; display:block; overflow:visible; }
.svg-y-labels { display:flex; flex-direction:column; justify-content:space-between; font-size:10px; color:var(--muted); text-align:right; min-width:28px; padding:2px 0; }
.chart-goal-label { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--sub); margin-top:8px; }
.goal-band-dot { width:10px; height:10px; background:rgba(232,255,71,.1); border:1px solid rgba(232,255,71,.3); border-radius:2px; flex-shrink:0; }
.orm-badge { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; }
.lift-meta-row { display:flex; gap:16px; margin-top:10px; padding-top:8px; border-top:1px solid var(--border); flex-wrap:wrap; }
.lift-meta-item { display:flex; flex-direction:column; gap:2px; }
.lift-meta-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.lift-meta-val { font-family:'Barlow Condensed',sans-serif; font-size:17px; font-weight:700; }
.recomp-explainer { font-size:13px; color:var(--sub); line-height:1.6; margin-bottom:14px; padding:12px 14px; background:var(--card); border:1px solid var(--border); border-radius:6px; }
.stretch-list { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-bottom:4px; }
.stretch-row { display:flex; align-items:center; gap:8px; padding:11px 14px; border-bottom:1px solid var(--border); font-size:14px; flex-wrap:wrap; }
.stretch-row:last-child { border-bottom:none; }
.stretch-name { flex:1; min-width:80px; font-weight:500; }
.stretch-curr { color:var(--sub); font-size:13px; }
.stretch-arrow { color:var(--muted); }
.stretch-target { color:var(--yellow); font-weight:600; }
.claude-export-card { background:rgba(91,164,255,.05); border:1px solid rgba(91,164,255,.2); border-radius:6px; padding:16px; margin-bottom:20px; }
.claude-export-text { font-size:13px; color:var(--sub); line-height:1.6; margin-bottom:14px; }
.btn-claude { background:transparent; border:1.5px solid var(--blue); color:var(--blue); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:11px 20px; border-radius:4px; cursor:pointer; width:100%; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
.btn-claude:active { background:var(--blue); color:#0a0a0a; }
.bw-log-entry { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.bw-current { font-family:'Barlow Condensed',sans-serif; font-size:38px; font-weight:900; color:var(--text); line-height:1; }
.bw-goal { font-size:12px; color:var(--sub); margin-top:4px; }
.bw-goal.in-goal { color:var(--green); }
.bw-quick-entry { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:12px 14px; margin-bottom:12px; }
.bw-quick-row { display:flex; align-items:center; gap:8px; }
.bw-quick-num { background:var(--card2); border:1px solid var(--border2); border-radius:4px; color:var(--yellow); font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:900; width:100px; text-align:center; padding:6px 4px; flex-shrink:0; }
.bw-quick-num:focus { outline:none; border-color:var(--yellow); }
.bw-quick-num::placeholder { color:var(--muted); }
.bw-quick-unit { font-family:'Barlow Condensed',sans-serif; font-size:16px; color:var(--sub); flex-shrink:0; }
.bw-quick-date-input { flex:1; background:var(--card2); border:1px solid var(--border); border-radius:4px; color:var(--sub); font-size:13px; padding:8px; min-width:0; }
.bw-quick-date-input:focus { outline:none; border-color:var(--yellow); }
.bw-quick-save { background:var(--yellow); color:#0a0a0a; border:none; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:9px 16px; border-radius:4px; cursor:pointer; flex-shrink:0; -webkit-tap-highlight-color:transparent; }
.bw-quick-save:active { opacity:0.75; }
.bw-range-toggle { display:flex; gap:6px; margin-bottom:10px; }
.bw-range-btn { flex:1; background:var(--card); border:1px solid var(--border); border-radius:4px; color:var(--sub); font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:8px 4px; cursor:pointer; transition:all 0.12s; -webkit-tap-highlight-color:transparent; }
.bw-range-btn.active { background:var(--yellow); border-color:var(--yellow); color:#0a0a0a; }
.bw-history { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.bw-hist-row { display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); font-size:14px; gap:10px; }
.bw-hist-row:last-child { border-bottom:none; }
.bw-hist-date { color:var(--sub); flex:1; }
.bw-hist-val { font-weight:600; color:var(--text); }
.bw-hist-del { background:transparent; border:none; color:var(--muted); cursor:pointer; font-size:16px; padding:2px 6px; -webkit-tap-highlight-color:transparent; }
/* History rows — compact, scannable */
.hist-row { display:flex; flex-direction:column; gap:3px; padding:12px 0; border-bottom:1px solid var(--border); }
.hist-row:last-child { border-bottom:none; }
.hist-row-left { display:flex; align-items:baseline; gap:10px; }
.hist-row-date { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; color:var(--yellow); }
.hist-row-day { font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; text-transform:uppercase; color:var(--sub); letter-spacing:0.5px; }
.hist-row-detail { font-size:12px; color:var(--muted); line-height:1.4; }
.hist-gap { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--red); opacity:0.5; padding:8px 0 4px; text-align:center; }
/* Picker last-done label */
.picker-day-last { font-size:12px; color:var(--muted); margin-top:3px; }
.sport-log { padding:16px; }
.sport-log-label { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--sub); margin-bottom:14px; }
.sport-fields { display:grid; gap:14px; }
.sport-fields label { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:1px; display:grid; gap:6px; }
.sport-select { background:var(--card2); border:1px solid var(--border2); border-radius:4px; color:var(--text); font-size:16px; padding:10px 12px; -webkit-appearance:none; }
.set-input { background:var(--card2); border:1px solid var(--border2); border-radius:4px; color:var(--text); font-size:16px; padding:9px 12px; width:100%; }

/* ── TOAST ── */
#toast { position:fixed; bottom:calc(var(--nav-h) + var(--safe-bot) + 12px); left:50%; transform:translateX(-50%) translateY(16px); background:var(--card2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px; text-transform:uppercase; padding:10px 20px; border-radius:4px; opacity:0; transition:all 0.2s; z-index:600; white-space:nowrap; pointer-events:none; }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
